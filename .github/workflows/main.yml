#===============================================================
# ІНЖЕКЦІЙНА YAML КОНФІГУРАЦІЯ ДЛЯ coArchi2
#===============================================================
name: Build coArchi2 Plugin (Tycho Inject)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archi Main Repository
        uses: actions/checkout@v5
        with:
          repository: archimatetool/archi
          ref: release_5.9.0
          path: archi

      - name: Checkout Plugin Repository
        uses: actions/checkout@v5
        with:
          path: coArchi2

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dynamic Tycho Inject
        working-directory: ./archi
        run: |
          echo "1. Копіюємо папки плагіну в корінь Archi..."
          cp -r ../coArchi2/com.archimatetool.modelrepository* .
          
          echo "2. Отримуємо версію Archi з головного pom.xml..."
          PARENT_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "Archi Version detected: ${PARENT_VERSION}"
          
          echo "3. Генеруємо pom.xml для модулів плагіну..."
          for module in com.archimatetool.modelrepository com.archimatetool.modelrepository.commandline; do
            if [ -d "$module" ]; then
              cat <<EOF > $module/pom.xml
          <project><modelVersion>4.0.0</modelVersion><parent><groupId>com.archimatetool</groupId><artifactId>archi</artifactId><version>${PARENT_VERSION}</version></parent><artifactId>$module</artifactId><packaging>eclipse-plugin</packaging></project>
          EOF
            fi
          done
          
          if [ -d "com.archimatetool.modelrepository.feature" ]; then
            cat <<EOF > com.archimatetool.modelrepository.feature/pom.xml
          <project><modelVersion>4.0.0</modelVersion><parent><groupId>com.archimatetool</groupId><artifactId>archi</artifactId><version>${PARENT_VERSION}</version></parent><artifactId>com.archimatetool.modelrepository.feature</artifactId><packaging>eclipse-feature</packaging></project>
          EOF
          fi
          
          echo "4. Вбудовуємо модулі в головний збиральний конвеєр Archi..."
          perl -0777 -pi -e 's/<\/modules>/\t<module>com.archimatetool.modelrepository<\/module>\n\t<module>com.archimatetool.modelrepository.commandline<\/module>\n\t<module>com.archimatetool.modelrepository.feature<\/module>\n<\/modules>/s' pom.xml

      - name: Build with Maven
        working-directory: ./archi
        run: mvn clean package -B

      - name: Package .archiplugin
        working-directory: ./archi
        run: |
          echo "Збираємо результати..."
          mkdir -p output/plugins
          mkdir -p output/features
          
          # Збираємо всі скомпільовані JAR (ігноруємо source-архіви)
          find com.archimatetool.modelrepository*/target/ -name "*.jar" ! -name "*-sources.jar" -type f -exec cp {} output/plugins/ \;
          
          # Переміщуємо feature JAR у відповідну папку
          mv output/plugins/*feature*.jar output/features/ 2>/dev/null || true
          
          # Пакуємо готовий плагін
          cd output
          zip -r ../coArchi2.archiplugin *

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v5
        with:
          name: coArchi2-ready
          path: ./archi/coArchi2.archiplugin
#===============================================================
