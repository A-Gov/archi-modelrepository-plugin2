#===============================================================
# YAML КОНФІГУРАЦІЯ ДЛЯ coArchi2 (Node 24 + Archiplugin Fix)
#===============================================================

name: Build coArchi2 Plugin

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archi Main Repository (release_5.9.0)
        uses: actions/checkout@v5 # Оновлено до v5 (Node.js 24)
        with:
          repository: archimatetool/archi
          ref: release_5.9.0
          path: archi

      - name: Checkout Plugin Repository
        uses: actions/checkout@v5 # Оновлено до v5 (Node.js 24)
        with:
          path: coArchi2

      - name: Set up JDK 17
        uses: actions/setup-java@v5 # Оновлено до v5 (Node.js 24)
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./coArchi2
        run: mvn clean package -B -e

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v5 # Оновлено до v5 (Node.js 24)
        if: always()
        with:
          name: coArchi2-build
          # Розширений пошук артефактів для екосистеми Archi/Tycho
          path: |
            ./coArchi2/**/*.archiplugin
            ./coArchi2/**/*.zip
            ./coArchi2/**/target/*.jar

#===============================================================
