#===============================================================
# YAML КОНФІГУРАЦІЯ (VERSION SYNC) ДЛЯ coArchi2
#===============================================================
name: Build coArchi2 Plugin (Tycho Inject - Strict Versions)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archi Main Repository
        uses: actions/checkout@v5
        with:
          repository: archimatetool/archi
          ref: release_5.9.0
          path: archi

      - name: Checkout Plugin Repository
        uses: actions/checkout@v5
        with:
          path: coArchi2

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Dynamic Tycho Inject & Version Sync
        working-directory: ./archi
        run: |
          echo "1. Копіюємо папки плагіну в корінь Archi..."
          cp -r ../coArchi2/com.archimatetool.modelrepository* .
          
          echo "2. Отримуємо версію Archi з головного pom.xml..."
          PARENT_VERSION=$(grep -m1 '<version>' pom.xml | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          
          echo "3. Синхронізуємо версії та генеруємо pom.xml для модулів..."
          for module in com.archimatetool.modelrepository com.archimatetool.modelrepository.commandline; do
            if [ -d "$module" ]; then
              # Читаємо OSGi версію з маніфесту та конвертуємо в Maven-формат
              OSGI_VERSION=$(grep 'Bundle-Version:' $module/META-INF/MANIFEST.MF | awk '{print $2}' | tr -d '\r')
              MVN_VERSION=${OSGI_VERSION/.qualifier/-SNAPSHOT}
              echo "Версія модуля $module: $MVN_VERSION"
              
              cat <<EOF > $module/pom.xml
          <project><modelVersion>4.0.0</modelVersion><parent><groupId>com.archimatetool</groupId><artifactId>archi</artifactId><version>${PARENT_VERSION}</version></parent><artifactId>$module</artifactId><version>${MVN_VERSION}</version><packaging>eclipse-plugin</packaging></project>
          EOF
            fi
          done
          
          echo "4. Синхронізуємо версію для Feature..."
          if [ -d "com.archimatetool.modelrepository.feature" ]; then
            # Читаємо версію з feature.xml
            OSGI_VERSION_FEATURE=$(grep -m1 'version=' com.archimatetool.modelrepository.feature/feature.xml | sed 's/.*version="\([^"]*\)".*/\1/' | tr -d '\r')
            MVN_VERSION_FEATURE=${OSGI_VERSION_FEATURE/.qualifier/-SNAPSHOT}
            echo "Версія Feature: $MVN_VERSION_FEATURE"
            
            cat <<EOF > com.archimatetool.modelrepository.feature/pom.xml
          <project><modelVersion>4.0.0</modelVersion><parent><groupId>com.archimatetool</groupId><artifactId>archi</artifactId><version>${PARENT_VERSION}</version></parent><artifactId>com.archimatetool.modelrepository.feature</artifactId><version>${MVN_VERSION_FEATURE}</version><packaging>eclipse-feature</packaging></project>
          EOF
          fi
          
          echo "5. Вбудовуємо модулі в головний збиральний конвеєр Archi..."
          perl -0777 -pi -e 's/<\/modules>/\t<module>com.archimatetool.modelrepository<\/module>\n\t<module>com.archimatetool.modelrepository.commandline<\/module>\n\t<module>com.archimatetool.modelrepository.feature<\/module>\n<\/modules>/s' pom.xml

      - name: Build with Maven
        working-directory: ./archi
        run: mvn clean package -B

      - name: Package .archiplugin
        working-directory: ./archi
        run: |
          echo "Збираємо результати..."
          mkdir -p output/plugins
          mkdir -p output/features
          
          find com.archimatetool.modelrepository*/target/ -name "*.jar" ! -name "*-sources.jar" -type f -exec cp {} output/plugins/ \;
          mv output/plugins/*feature*.jar output/features/ 2>/dev/null || true
          
          cd output
          zip -r ../coArchi2.archiplugin *

      - name: Upload Plugin Artifact
        uses: actions/upload-artifact@v5
        with:
          name: coArchi2-ready
          path: ./archi/coArchi2.archiplugin
#===============================================================
