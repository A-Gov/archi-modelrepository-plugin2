#===============================================================
# SMART YAML КОНФІГУРАЦІЯ ДЛЯ coArchi2
#===============================================================
name: Build coArchi2 Plugin (Smart Detect)

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archi Main Repository (release_5.9.0)
        uses: actions/checkout@v4
        with:
          repository: archimatetool/archi
          ref: release_5.9.0
          path: archi

      - name: Checkout Plugin Repository
        uses: actions/checkout@v4
        with:
          path: coArchi2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Ant (if needed)
        run: sudo apt-get install -y ant

      - name: Smart Build (Maven or Ant)
        working-directory: ./coArchi2
        run: |
          echo "=== Вміст кореневої папки плагіну ==="
          ls -la
          echo "====================================="
          
          if [ -f "pom.xml" ]; then
            echo "Знайдено pom.xml! Запускаю Maven..."
            mvn clean package -B -e
          elif [ -f "build.xml" ]; then
            echo "Знайдено build.xml! Запускаю Ant..."
            # Передаємо шлях до Archi на випадок, якщо Ant-скрипт його потребує
            ant -Darchi.dir=../archi
          else
            echo "[ПОМИЛКА] Не знайдено ні pom.xml, ні build.xml у корені!"
            echo "Шукаю pom.xml у підпапках:"
            find . -name "pom.xml"
            exit 1
          fi

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coArchi2-build
          path: |
            ./coArchi2/**/*.archiplugin
            ./coArchi2/**/*.zip
            ./coArchi2/**/target/*.jar
#===============================================================
