#===============================================================
# АКТУАЛЬНА YAML КОНФІГУРАЦІЯ (Node 24 Ready) ДЛЯ coArchi2
#===============================================================

name: Build coArchi2 Plugin

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archi Main Repository
        uses: actions/checkout@v5
        with:
          repository: archimatetool/archi
          path: archi

      - name: Checkout Plugin Repository
        uses: actions/checkout@v5
        with:
          path: coArchi2

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: ./coArchi2
        run: mvn clean package

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: coArchi2-build
          path: ./coArchi2/**/*.zip

#===============================================================
