#===============================================================
# DEBUG YAML КОНФІГУРАЦІЯ ДЛЯ coArchi2 (Archi ref: release_5.9.0)
#===============================================================

name: Build coArchi2 Plugin

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Archi Main Repository (release_5.9.0)
        uses: actions/checkout@v4 # Використовуємо стабільну v4
        with:
          repository: archimatetool/archi
          ref: release_5.9.0 # Жорстка прив'язка до сумісної версії Archi
          path: archi

      - name: Checkout Plugin Repository
        uses: actions/checkout@v4
        with:
          path: coArchi2

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (Batch Mode & Stacktraces)
        working-directory: ./coArchi2
        # -B вимикає спам прогрес-барів, -e показує повний стек помилки
        run: mvn clean package -B -e

      - name: Upload Plugin Artifacts
        uses: actions/upload-artifact@v4
        if: always() # Зберігати артефакти навіть при помилці (корисно для логів)
        with:
          name: coArchi2-build
          path: ./coArchi2/**/*.zip

#===============================================================
